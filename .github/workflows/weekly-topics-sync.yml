name: Weekly Topics Sync

on:
  schedule:
    # Paused for summer break (Jul-Aug), resumes automatically Sep 1
    - cron: "0 13 * 1-6,9-12 3"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Send weekly topics email
        run: |
          node src/weekly-topics-sync.mjs \
            --bakalari-base-url="${{ secrets.BAKALARI_BASE_URL }}" \
            --bakalari-username="${{ secrets.BAKALARI_USERNAME }}" \
            --bakalari-password="${{ secrets.BAKALARI_PASSWORD }}"
        env:
          GOOGLEAI_API_KEY: ${{ secrets.GOOGLEAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PARENT: ${{ secrets.EMAIL_PARENT }}
          EMAIL_KID: ${{ secrets.EMAIL_KID }}
