name: Dashboard Sync

on:
  schedule:
    # Paused for summer break (Jul-Aug), resumes automatically Sep 1
    - cron: "*/30 * * 1-6,9-12 *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate dashboard
        run: |
          node src/dashboard-sync.mjs \
            --bakalari-base-url="${{ secrets.BAKALARI_BASE_URL }}" \
            --bakalari-username="${{ secrets.BAKALARI_USERNAME }}" \
            --bakalari-password="${{ secrets.BAKALARI_PASSWORD }}" \
            --golemio-token="${{ secrets.GOLEMIO_API }}" \
            --stop-id-1="${{ secrets.STOP_1 }}" \
            --stop-id-2="${{ secrets.STOP_2 }}" \
            --output="dashboard/dashboard.png"

      - name: Commit dashboard image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/dashboard.png
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push
